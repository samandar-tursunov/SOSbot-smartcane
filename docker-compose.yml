services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sosbot}
      POSTGRES_USER: ${POSTGRES_USER:-sosbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sosbot_secret}
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sosbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CREATE_SUPERUSER: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
